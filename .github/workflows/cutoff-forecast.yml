name: Aggiorna previsione cutoff

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Interroga mplus-title per ogni regione
        run: |
          END=$(jq -r .endDate docs/data/season.json)
          out="{"
          for R in EU US KR TW; do
            LINE=$(curl -sf "https://mplus-title.vercel.app/api/cutoff/$R?extrapolationEndDate=$END" || true)
            CUR=$(echo "$LINE" | grep -oP 'Current:\s*\K[\d.]+' || echo null)
            EST=$(echo "$LINE" | grep -oP 'Estimation \([^)]*\):\s*\K[\d.]+' || echo null)
            out="$out\"$R\":{\"current\":$CUR,\"estimation\":$EST},"
          done
          out="$out\"updatedAt\":\"$(date -u +%FT%TZ)\"}"
          echo "$out" | jq . > docs/data/cutoff-forecast.json
          cat docs/data/cutoff-forecast.json

      - name: Commit se cambiato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/cutoff-forecast.json
          if ! git diff --cached --quiet; then
            git commit -m "Aggiorna previsione cutoff [bot]"
            git push
          fi
